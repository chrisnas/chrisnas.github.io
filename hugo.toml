baseURL = 'https://chrisnas.github.io/'
languageCode = 'en-us'
title = "Welcome to Christophe Nasarre's Blog"
theme = 'PaperMod'
[pagination]
  pagerSize = 200   # load all posts; JS handles client-side pagination

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Christophe Nasarre"
  description = ".NET internals, GC, diagnostics and performance"
  defaultTheme = "auto"        # auto, light, dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true   # copy button on code blocks
  ShowToc = true               # table of contents in posts
  TocOpen = false
  comments = true              # enable Giscus comments/reactions on posts

  [params.fuseOpts]
    iscasesensitive = false
    shouldsort = true
    location = 0
    distance = 1000
    threshold = 0.1           # 0=exact, 1=match anything; 0.1 = very strict
    minmatchcharlength = 3
    ignorelocation = true
    keys = ["title", "content"]

[params.cover]
  hiddenInList = false   # show cover image in post list on home page
  hiddenInSingle = false # show cover image inside the post too

[params.homeInfoParams]
  Title = "Welcome to Christophe Nasarre's Blog"
  Content = "I write about .NET internals, garbage collection, diagnostics and performance."
  ImageUrl = "/images/ChristopheNasarre.jpg"

[markup.highlight]
  noClasses = false            # use external CSS for highlight styles
  lineNos = true               # show line numbers
  lineNumbersInTable = true
  style = "github-dark"        # code block theme

[markup.goldmark.renderer]
  unsafe = true                # allow raw HTML in Markdown (needed for migration)

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 2
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4
