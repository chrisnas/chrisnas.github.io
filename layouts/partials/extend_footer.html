<!-- Persist search query in URL so Back button restores it -->
<script>
(function() {
  var sInput = document.getElementById('searchInput');
  if (!sInput) return;
  var resList = document.getElementById('searchResults');

  // Update URL as user types
  sInput.addEventListener('keyup', function() {
    var val = this.value.trim();
    var url = new URL(window.location);
    if (val) {
      url.searchParams.set('q', val);
    } else {
      url.searchParams.delete('q');
    }
    history.replaceState(null, '', url);
  });

  // Group search results by year
  var observer;
  function groupByYear() {
    observer.disconnect();

    var items = resList.querySelectorAll('li.search-entry');
    if (items.length === 0) {
      observer.observe(resList, { childList: true });
      return;
    }

    resList.querySelectorAll('.search-year-header').forEach(function(h) { h.remove(); });

    var yearCounts = {};
    items.forEach(function(li) {
      var dateEl = li.querySelector('.search-entry-date');
      if (!dateEl) return;
      var year = dateEl.textContent.trim().substring(0, 4);
      yearCounts[year] = (yearCounts[year] || 0) + 1;
    });

    var lastYear = '';
    items.forEach(function(li) {
      var dateEl = li.querySelector('.search-entry-date');
      if (!dateEl) return;
      var year = dateEl.textContent.trim().substring(0, 4);
      if (year !== lastYear) {
        var header = document.createElement('li');
        header.className = 'search-year-header';
        header.innerHTML = '<h2>' + year + ' <sup>' + yearCounts[year] + '</sup></h2>';
        li.parentNode.insertBefore(header, li);
        lastYear = year;
      }
    });

    observer.observe(resList, { childList: true });
  }

  // Watch for search results changes and group by year
  observer = new MutationObserver(function() { groupByYear(); });
  observer.observe(resList, { childList: true });

  // Restore query from URL on page load
  var q = new URLSearchParams(window.location.search).get('q');
  if (q) {
    sInput.value = q;
    function triggerSearch() {
      sInput.dispatchEvent(new KeyboardEvent('keyup', { key: 'a' }));
    }
    document.addEventListener('fuseReady', triggerSearch, { once: true });
    // Fallback in case fuseReady already fired before this script ran
    setTimeout(function() {
      if (resList && !resList.innerHTML) triggerSearch();
    }, 5000);
  }
})();
</script>
