{{- with site.Params.homeInfoParams }}
<article class="first-entry home-info" style="margin-bottom: 2.5rem;">
    <div class="home-info-body">
        {{- with .ImageUrl }}
        <img src="{{ . }}" alt="Profile picture" class="home-info-avatar">
        {{- end }}
        <div class="home-info-text">
            <h1>{{ .Title | markdownify }}</h1>
            {{- with .Content }}
            <p class="home-info-desc">{{ . | markdownify }}</p>
            {{- end }}
            <a href="https://follow.it/welcome-to-christophe-nasarre-s-blog?leanpub" title="Subscribe to new posts" target="_blank" rel="noopener" class="follow-btn">
                <img src="https://follow.it/images/icons/followicons/14.png" alt="Subscribe">
            </a>
        </div>
    </div>
    <footer class="entry-footer">
        {{ partial "social_icons.html" (dict "align" site.Params.homeInfoParams.AlignSocialIconsTo) }}
    </footer>
</article>
{{- end -}}
